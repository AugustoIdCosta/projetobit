apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-worker
  template:
    metadata:
      labels:
        app: crypto-worker
    spec:
      containers:
        - name: crypto-worker
          image: augusto-idalgo/crypto-worker:v1
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL